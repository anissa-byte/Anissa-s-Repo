name: Deploy L10 Dashboard

on:
  push:
    paths:
      - 'l10-dashboard/**'
      - '.github/workflows/deploy-l10-dashboard.yml'
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject config
        run: |
          cat > l10-dashboard/config.js << 'JSEOF'
          const CONFIG = {
            AIRTABLE_BASE: 'app0MXWD2LKazuQo1',
            NOTES_TABLE: 'tbl2nBvnsJLnoNhHK',
            ISSUES_TABLE: 'tbltJ7ROJhJ4TqzAQ',
            AIRTABLE_TOKEN: '${{ secrets.AIRTABLE_TOKEN }}',
            PASSWORD: 'EOS',
          };
          JSEOF

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: 'l10-dashboard'
      - id: deployment
        uses: actions/deploy-pages@v4
